name: NEAR Square post

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Only generate text, no Binance publish
        type: boolean
        default: false
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

concurrency:
  group: near-square-post-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      BINANCE_SQUARE_API_KEY: ${{ secrets.BINANCE_SQUARE_API_KEY }}
      GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SQUARE_SPOT_TRADE_URL: ${{ secrets.SQUARE_SPOT_TRADE_URL }}
      SQUARE_TRADE_CTA_LINE: ${{ secrets.SQUARE_TRADE_CTA_LINE }}
      SQUARE_CONTENT_EXTRA: ${{ secrets.SQUARE_CONTENT_EXTRA }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python post_square.py --dry-run
          else
            python post_square.py
          fi
