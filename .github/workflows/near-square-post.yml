name: NEAR Square post

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Only generate text, no Binance publish
        type: boolean
        default: false
      cron_id:
        description: Optional label from external cron (logged only)
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Cache actions still ship on Node 20 until upstream moves default; opt into Node 24 per GitHub guidance.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Tuned for frequent runs (e.g. every 15m ≈ 4 Groq calls/hour if 1 attempt each).
      GROQ_MAX_TOKENS: "300"
      GROQ_GENERATION_ATTEMPTS: "1"
      GROQ_ANTI_REPEAT_TEASERS: "3"
      # Multi-account mode
      BINANCE_SQUARE_ACCOUNTS: acc1,acc2,acc3
      BINANCE_SQUARE_API_KEY_ACC1: ${{ secrets.BINANCE_SQUARE_API_KEY_ACC1 }}
      BINANCE_SQUARE_API_KEY_ACC2: ${{ secrets.BINANCE_SQUARE_API_KEY_ACC2 }}
      BINANCE_SQUARE_API_KEY_ACC3: ${{ secrets.BINANCE_SQUARE_API_KEY_ACC3 }}
      GROQ_API_KEY_ACC1: ${{ secrets.GROQ_API_KEY_ACC1 }}
      GROQ_API_KEY_ACC2: ${{ secrets.GROQ_API_KEY_ACC2 }}
      GROQ_API_KEY_ACC3: ${{ secrets.GROQ_API_KEY_ACC3 }}
      GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SQUARE_SPOT_TRADE_URL: ${{ secrets.SQUARE_SPOT_TRADE_URL }}
      SQUARE_TRADE_CTA_LINE: ${{ secrets.SQUARE_TRADE_CTA_LINE }}
      SQUARE_CONTENT_EXTRA: ${{ secrets.SQUARE_CONTENT_EXTRA }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache/restore@v4
        id: cache_fp
        with:
          path: state
          key: near-post-fp-${{ github.run_id }}
          restore-keys: near-post-fp-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run
        env:
          POST_FINGERPRINT_DIR: state
          CRON_TRIGGER_ID: ${{ github.event.inputs.cron_id }}
        run: |
          echo "workflow_dispatch cron_id=${CRON_TRIGGER_ID:-}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python post_square.py --dry-run
          else
            python post_square.py
          fi

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: state
          key: near-post-fp-${{ github.run_id }}
